name: Auto Trigger Vercel Sync

# 定时规则：每4小时自动空提交推送
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set git user info
        run: |
          git config user.name "AutoSyncBot"
          git config user.email "bot@example.com"

      - name: Empty commit & push
        run: |
          git commit --allow-empty -m "自动唤醒Vercel同步"
          git push
